name: release-woos

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

jobs:
  auto_release:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm xorriso

      - name: Build os.img
        run: make os.img

      - name: Resolve version and tag
        id: version
        run: |
          VERSION="$(cat VERSION)"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not exist
        run: |
          if git ls-remote --exit-code --tags origin "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists."
            exit 1
          fi

      - name: Build release notes from changelog
        id: notes
        run: |
          NOTES_FILE="release_notes.md"
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "# WoOS ${VERSION}"
            echo
            echo "Автоматический релиз после merge PR #${{ github.event.pull_request.number }}."
            echo
            echo "## Изменения"
            bash .github/scripts/extract_changelog.sh "$VERSION"
          } > "$NOTES_FILE"
          echo "notes_path=${NOTES_FILE}" >> "$GITHUB_OUTPUT"


      - name: Verify release payload
        run: |
          test -f os.img
          test -s "${{ steps.notes.outputs.notes_path }}"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          name: WoOS ${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: |
            os.img
          draft: false
          prerelease: false
