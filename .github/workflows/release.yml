name: release-woos

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download os.img artifact from build workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          commit: ${{ github.sha }}
          name: os-image-${{ github.sha }}
          path: dist
          if_no_artifact_found: fail

      - name: Build release notes from changelog
        id: notes
        run: |
          NOTES_FILE="release_notes.md"
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "# WoOS ${VERSION}"
            echo
            echo "Автоматический релиз, сформированный из CI-артефакта сборки."
            echo
            echo "## Изменения"
            bash .github/scripts/extract_changelog.sh "$VERSION"
          } > "$NOTES_FILE"
          {
            echo "notes_path=${NOTES_FILE}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify release payload
        run: |
          test -f dist/os.img
          test -s "${{ steps.notes.outputs.notes_path }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: WoOS ${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: |
            dist/os.img
          draft: false
          prerelease: false
