name: release-woos

on:
  # Старый путь: merge PR → релиз
  pull_request_target:
    types:
      - closed

  # Новый путь: push в main → автоматический релиз
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  auto_release:
    # Запускаем если:
    #   • PR был смержен, ИЛИ
    #   • прямой push в main
    if: >
      (github.event_name == 'pull_request_target' && github.event.pull_request.merged == true) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # При PR берём merge-коммит, при push — HEAD
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.merge_commit_sha || github.sha }}
          fetch-depth: 0

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm xorriso gcc-multilib binutils

      - name: Build os.img
        run: make os.img

      - name: Resolve version and tag
        id: version
        run: |
          VERSION="$(cat VERSION)"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "$TAG" > /dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes from changelog
        if: steps.tag_check.outputs.skip == 'false'
        id: notes
        run: |
          NOTES_FILE="release_notes.md"
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "# WoOS ${VERSION}"
            echo
            if [ "${{ github.event_name }}" = "pull_request_target" ]; then
              echo "Автоматический релиз после merge PR #${{ github.event.pull_request.number }}."
            else
              echo "Автоматический релиз после push в \`main\` (коммит \`${{ github.sha }}\`)."
            fi
            echo
            echo "## Изменения"
            bash .github/scripts/extract_changelog.sh "$VERSION"
          } > "$NOTES_FILE"
          echo "notes_path=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Verify release payload
        if: steps.tag_check.outputs.skip == 'false'
        run: |
          test -f os.img
          test -s "${{ steps.notes.outputs.notes_path }}"

      - name: Publish GitHub Release
        if: steps.tag_check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.merge_commit_sha || github.sha }}
          name: WoOS ${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          files: |
            os.img
          draft: false
          prerelease: false
