name: build-woos

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc-multilib binutils

      - name: Build image
        run: make os.img

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: woos-image
          path: os.img
