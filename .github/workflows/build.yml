name: Build WoOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib binutils

    - name: Compile OS
      run: make

    - name: Upload OS Image
      uses: actions/upload-artifact@v3
      with:
        name: woos-image
        path: os.img
